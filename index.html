<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-K-G-F ON WEB</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    text-align:center;
    padding:50px 20px;
    background:linear-gradient(135deg,#ff8c00,#ff4500);
}

header h1{
    font-size:3rem;
}

header p{
    margin-top:10px;
    font-size:1.2rem;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

section{
    padding:50px 20px;
    max-width:1000px;
    margin:auto;
}

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#222;
    padding:20px;
    border-radius:15px;
    border:1px solid #444;
}

.card h3{
    color:orange;
    margin-bottom:10px;
}

.rank{
    margin:10px 0;
    padding:10px;
    background:#333;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:30px;
    background:#000;
}

.coin{
    color:gold;
    font-size:1.2rem;
}
</style>
</head>
<body>

<header>
    <h1>♟️ K-K-G-F</h1>
    <p>Keshav Kumar Gautam & Friends</p>
    <p>Leader: 👑 Keshav-Kumar-Gautam</p>

    <a class="btn"
       href="https://lichess.org/team/keshav-kumar-gautam-and-friends-k-k-g-f"
       target="_blank">
       Join Our Team
    </a>
</header>

<section>
    <h2>About Us</h2>
    <br>
    <p>
        Welcome to K-K-G-F ON WEB!
        We play tournaments, team battles,
        improve together,
        and have fun.
    </p>
</section>

<footer>
    <p>♟️ K-K-G-F Official Website</p>
    <p class="coin">have fun • Rank Up • Dominate Team Battles</p>
</footer>

</body>
</html>
